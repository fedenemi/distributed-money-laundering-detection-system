    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=warning
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  usd_filter_0:
    build:
      context: ./src
      dockerfile: filters/Dockerfile
    container_name: usd_filter_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - RABBITMQ_HOST=rabbitmq
    - N_UPSTREAM=1
    - N_UPSTREAM=1
    - INPUT_EXCHANGE=gateway_exc
    - CONSUMER_GROUP=usd_filter
    - SHARD_ID=0
    - OUTPUT_EXCHANGE=usd_transactions_exc
    - OUTPUT_SHARDS=3
    - FILTER_FIELD=Payment Currency
    - FILTER_OP=eq
    - FILTER_VALUE=US Dollar
    - TOTAL_CLIENTS=1
  usd_filter_1:
    build:
      context: ./src
      dockerfile: filters/Dockerfile
    container_name: usd_filter_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - RABBITMQ_HOST=rabbitmq
    - N_UPSTREAM=1
    - N_UPSTREAM=1
    - INPUT_EXCHANGE=gateway_exc
    - CONSUMER_GROUP=usd_filter
    - SHARD_ID=1
    - OUTPUT_EXCHANGE=usd_transactions_exc
    - OUTPUT_SHARDS=3
    - FILTER_FIELD=Payment Currency
    - FILTER_OP=eq
    - FILTER_VALUE=US Dollar
    - TOTAL_CLIENTS=1
