services:
  chaos_monkey:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    environment:
    - CHAOS_TARGETS=usd_filter_0,q1_data_reducer_0,q2_aggregator_0,q2_banks_name_adder_0,q3_avg_and_transactions_joiner_0,q4_inc_edges_filter_0,q4_paths_creators_0,q5_money_converter_0
    - CHAOS_INTERVAL=30
    - CHAOS_MIN_WAIT=30
    profiles:
    - chaos
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./docker-compose.yaml:/app/docker-compose.yaml
    - ./scripts/chaos_monkey.yaml:/app/scripts/chaos_monkey.yaml
  client_0:
    build:
      context: ./src
      dockerfile: client/Dockerfile
    container_name: client_0
    depends_on:
      gateway:
        condition: service_started
    environment:
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=7659
    - BATCH_SIZE=5000
    - TRANSACTIONS_FILE=/datasets/LI-Small_Trans.csv
    - ACCOUNTS_FILE=/datasets/LI-Small_accounts.csv
    - CLIENT_ID=0
    - RESULTS_DIR=/results
    - BATCH_SIZE=20000
    volumes:
    - ./datasets:/datasets
    - ./results:/results
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
      worker_logs_cleaner:
        condition: service_completed_successfully
    environment:
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=7659
    - GATEWAY_OUTPUT_BATCH_SIZE=5000
    - OUTPUT_EXCHANGE=gateway_exc
    - ACCOUNTS_OUTPUT_EXCHANGE=accounts_exc
    - ACCOUNTS_OUTPUT_SHARDS=2
    - INPUT_QUEUE_PREFIX=results
    - TOTAL_QUERIES=5
    - MAX_IN_FLIGHT_BATCHES=0
    - OUTPUT_SHARDS=3
    - QUERY_1_N_UPSTREAM=2
    - QUERY_2_N_UPSTREAM=2
    - QUERY_3_N_UPSTREAM=3
    - QUERY_4_N_UPSTREAM=1
    - QUERY_5_N_UPSTREAM=1
