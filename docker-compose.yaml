services:
  client_0:
    build:
      context: ./src
      dockerfile: client/Dockerfile
    container_name: client_0
    depends_on:
      gateway:
        condition: service_started
    environment:
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=7659
    - BATCH_SIZE=20000
    - TRANSACTIONS_FILE=/datasets/LI-Small_Trans.csv
    - ACCOUNTS_FILE=/datasets/LI-Small_accounts.csv
    - CLIENT_ID=0
    - RESULTS_DIR=/results
    volumes:
    - ./datasets:/datasets
    - ./results:/results
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=7659
    - GATEWAY_OUTPUT_BATCH_SIZE=10000
    - OUTPUT_EXCHANGE=gateway_exc
    - INPUT_QUEUE_PREFIX=results
    - TOTAL_QUERIES=5
    - OUTPUT_SHARDS=2
    - QUERY_1_N_UPSTREAM=2
    - QUERY_2_N_UPSTREAM=2
    - QUERY_3_N_UPSTREAM=3
    - QUERY_4_N_UPSTREAM=1
    - QUERY_5_N_UPSTREAM=1
    - TRANSACTION_COLUMNS=Timestamp,From Bank,Account,To Bank,Account.1,Amount Received,Receiving
      Currency,Amount Paid,Payment Currency,Payment Format
